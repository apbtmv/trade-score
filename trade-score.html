<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeScore</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --buy: #00e5a0;
    --sell: #ff4757;
    --hold: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    position: relative;
    z-index: 1;
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
  }
  header span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* API設定 */
  .api-card {
    background: rgba(255,209,102,0.05);
    border: 1px solid rgba(255,209,102,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .api-card-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--hold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .api-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 8px;
  }
  .api-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .api-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--hold); }
  .api-input::placeholder { color: var(--muted); }
  .api-save-btn {
    margin-top: 10px;
    padding: 8px 16px;
    background: var(--hold);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .api-status {
    font-size: 11px;
    color: var(--buy);
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    display: none;
  }
  .api-status.show { display: block; }

  /* Input */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .input-card label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .ticker-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .ticker-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
  }
  .ticker-input:focus { border-color: var(--accent); }
  .ticker-input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; font-size: 13px; }
  .market-toggle {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }
  .market-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .market-btn.active { background: var(--accent); color: var(--bg); font-weight: 500; }

  .notes-area {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--muted); }

  .analyze-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 16px;
  }
  .analyze-btn:hover { background: #00ffb3; transform: translateY(-1px); }
  .analyze-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

  /* Loading */
  .loading { display: none; text-align: center; padding: 40px 20px; }
  .loading.show { display: block; }
  .loader {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 13px; font-family: 'DM Mono', monospace; }
  .loading-steps { margin-top: 12px; }
  .loading-step {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin: 4px 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .loading-step.show { opacity: 1; color: var(--accent); }

  /* Result */
  .result { display: none; }
  .result.show { display: block; }

  /* Price card */
  .price-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .price-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .price-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .price-data {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .price-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .price-item-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .price-item-value { font-size: 14px; font-family: 'DM Mono', monospace; font-weight: 500; }
  .price-item-value.pos { color: var(--buy); }
  .price-item-value.neg { color: var(--sell); }

  /* Cross signal */
  .cross-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .cross-badge.golden { background: rgba(0,229,160,0.12); color: var(--buy); border: 1px solid rgba(0,229,160,0.2); }
  .cross-badge.dead { background: rgba(255,71,87,0.12); color: var(--sell); border: 1px solid rgba(255,71,87,0.2); }
  .cross-badge.none { background: rgba(90,90,114,0.15); color: var(--muted); border: 1px solid var(--border); }

  /* Score card */
  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--score-color, var(--accent));
  }
  .score-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .ticker-badge {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 2px;
  }
  .market-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    margin-left: 8px;
  }
  .verdict {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
  }
  .verdict.buy { background: rgba(0,229,160,0.15); color: var(--buy); }
  .verdict.sell { background: rgba(255,71,87,0.15); color: var(--sell); }
  .verdict.hold { background: rgba(255,209,102,0.15); color: var(--hold); }

  .gauge-wrap { margin-bottom: 20px; }
  .gauge-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .gauge-label span { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .gauge-label strong {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--score-color, var(--accent));
  }
  .gauge-label small { font-size: 16px; color: var(--muted); }
  .gauge-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .gauge-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--score-color, var(--accent));
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0;
  }

  .indicators-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .indicators-grid { display: flex; flex-direction: column; gap: 8px; }
  .indicator-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .ind-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .ind-icon.pos { background: rgba(0,229,160,0.12); }
  .ind-icon.neg { background: rgba(255,71,87,0.12); }
  .ind-icon.neu { background: rgba(255,209,102,0.12); }
  .ind-info { flex: 1; min-width: 0; }
  .ind-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .ind-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ind-score { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .ind-score.pos { color: var(--buy); }
  .ind-score.neg { color: var(--sell); }
  .ind-score.neu { color: var(--hold); }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .summary-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .summary-text { font-size: 14px; line-height: 1.7; color: var(--text); }
  .caution {
    background: rgba(255,209,102,0.06);
    border: 1px solid rgba(255,209,102,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--hold);
    margin-top: 12px;
    line-height: 1.5;
  }

  /* History */
  .history-section { margin-top: 24px; }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .clear-btn {
    background: none; border: none; color: var(--muted);
    font-size: 11px; font-family: 'DM Mono', monospace;
    cursor: pointer; padding: 2px 6px; border-radius: 4px;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: var(--sell); }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .hist-ticker { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; min-width: 80px; }
  .hist-score { font-family: 'DM Mono', monospace; font-size: 13px; min-width: 40px; }
  .hist-verdict {
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; letter-spacing: 1px;
  }
  .hist-verdict.buy { background: rgba(0,229,160,0.12); color: var(--buy); }
  .hist-verdict.sell { background: rgba(255,71,87,0.12); color: var(--sell); }
  .hist-verdict.hold { background: rgba(255,209,102,0.12); color: var(--hold); }
  .hist-date { font-size: 11px; color: var(--muted); margin-left: auto; font-family: 'DM Mono', monospace; }

  .empty-history { text-align: center; color: var(--muted); font-size: 13px; padding: 20px; }
  .error-msg {
    background: rgba(255,71,87,0.08);
    border: 1px solid rgba(255,71,87,0.2);
    border-radius: 8px;
    padding: 14px;
    color: var(--sell);
    font-size: 13px;
    display: none;
    margin-top: 12px;
    line-height: 1.6;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>TradeScore</h1>
    <span>AI 売買判断アシスト</span>
  </header>

  <!-- APIキー設定 -->
  <div class="api-card">
    <div class="api-card-title">⚙ APIキー設定（初回のみ）</div>
    <div class="api-row">
      <div class="api-label">Alpha Vantage キー（米国株・テクニカル）</div>
      <input class="api-input" id="avKey" type="password" placeholder="ここにAlpha VantageのAPIキーを貼る">
    </div>
    <div class="api-row">
      <div class="api-label">J-Quants リフレッシュトークン（日本株）</div>
      <input class="api-input" id="jqKey" type="password" placeholder="ここにJ-Quantsのリフレッシュトークンを貼る">
    </div>
    <button class="api-save-btn" onclick="saveKeys()">保存する</button>
    <div class="api-status" id="apiStatus">✓ キーを保存しました（このデバイスのみ）</div>
  </div>

  <!-- 銘柄入力 -->
  <div class="input-card">
    <label>銘柄 / TICKER</label>
    <div class="ticker-row">
      <input class="ticker-input" id="ticker" type="text" placeholder="例: 9506 / AAPL" maxlength="10">
      <div class="market-toggle">
        <button class="market-btn active" data-market="JP" onclick="setMarket('JP')">JP</button>
        <button class="market-btn" data-market="US" onclick="setMarket('US')">US</button>
      </div>
    </div>
    <label>追加メモ（任意）</label>
    <textarea class="notes-area" id="notes" placeholder="気になる情報があれば。空欄でもOK。AIが自動で指標を選定します。"></textarea>
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">AI分析スタート</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loader"></div>
    <p>データ取得中...</p>
    <div class="loading-steps">
      <div class="loading-step" id="step1">① 株価データを取得中</div>
      <div class="loading-step" id="step2">② 移動平均・クロス判定中</div>
      <div class="loading-step" id="step3">③ AIがスコアリング中</div>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="result"></div>

  <!-- History -->
  <div class="history-section">
    <div class="section-title">
      <span>履歴</span>
      <button class="clear-btn" onclick="clearHistory()">クリア</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
let market = 'JP';
let history = JSON.parse(localStorage.getItem('tradeScoreHistory') || '[]');

// APIキーをlocalStorageに保存（デバイスのみ）
function saveKeys() {
  const av = document.getElementById('avKey').value.trim();
  const jq = document.getElementById('jqKey').value.trim();
  if (av) localStorage.setItem('ts_av', av);
  if (jq) localStorage.setItem('ts_jq', jq);
  document.getElementById('apiStatus').classList.add('show');
  setTimeout(() => document.getElementById('apiStatus').classList.remove('show'), 3000);
}

function loadKeys() {
  const av = localStorage.getItem('ts_av') || '';
  const jq = localStorage.getItem('ts_jq') || '';
  if (av) document.getElementById('avKey').value = av;
  if (jq) document.getElementById('jqKey').value = jq;
}

function setMarket(m) {
  market = m;
  document.querySelectorAll('.market-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.market === m);
  });
}

function showStep(n) {
  document.getElementById('step' + n).classList.add('show');
}

// 移動平均計算
function calcMA(prices, period) {
  if (prices.length < period) return null;
  const slice = prices.slice(-period);
  return slice.reduce((a, b) => a + b, 0) / period;
}

// ゴールデンクロス・デッドクロス判定
function detectCross(prices) {
  if (prices.length < 26) return { type: 'none', ma5: null, ma25: null };
  const ma5now = calcMA(prices, 5);
  const ma25now = calcMA(prices, 25);
  const ma5prev = calcMA(prices.slice(0, -1), 5);
  const ma25prev = calcMA(prices.slice(0, -1), 25);

  let type = 'none';
  if (ma5prev <= ma25prev && ma5now > ma25now) type = 'golden';
  else if (ma5prev >= ma25prev && ma5now < ma25now) type = 'dead';
  else if (ma5now > ma25now) type = 'above'; // 5MA > 25MA（クロス後強い）
  else if (ma5now < ma25now) type = 'below';

  return { type, ma5: ma5now, ma25: ma25now };
}

// RSI計算
function calcRSI(prices, period = 14) {
  if (prices.length < period + 1) return null;
  const changes = [];
  for (let i = 1; i < prices.length; i++) {
    changes.push(prices[i] - prices[i - 1]);
  }
  const recent = changes.slice(-period);
  const gains = recent.filter(c => c > 0).reduce((a, b) => a + b, 0) / period;
  const losses = Math.abs(recent.filter(c => c < 0).reduce((a, b) => a + b, 0)) / period;
  if (losses === 0) return 100;
  const rs = gains / losses;
  return 100 - (100 / (1 + rs));
}

// Alpha Vantage から株価取得（米国株 or 日本株）
async function fetchAlphaVantage(ticker) {
  const key = localStorage.getItem('ts_av');
  if (!key) throw new Error('Alpha VantageのAPIキーが設定されていません。');
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${ticker}&outputsize=compact&apikey=${key}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data['Note']) throw new Error('Alpha Vantageのリクエスト上限に達しました。しばらく待ってください。');
  if (data['Error Message']) throw new Error('銘柄コードが見つかりません: ' + ticker);
  const series = data['Time Series (Daily)'];
  if (!series) throw new Error('データ取得に失敗しました。');
  const dates = Object.keys(series).sort();
  const prices = dates.map(d => parseFloat(series[d]['4. close']));
  const latest = parseFloat(series[dates[dates.length - 1]]['4. close']);
  const prev = parseFloat(series[dates[dates.length - 2]]['4. close']);
  const volume = parseInt(series[dates[dates.length - 1]]['5. volume']);
  return { prices, latest, prev, volume, date: dates[dates.length - 1] };
}

// J-Quants から日本株取得
async function fetchJQuants(ticker) {
  const refreshToken = localStorage.getItem('ts_jq');
  if (!refreshToken) throw new Error('J-Quantsのリフレッシュトークンが設定されていません。');

  // IDトークン取得
  const tokenRes = await fetch('https://api.jquants.com/v1/token/auth_refresh?refreshtoken=' + refreshToken, {
    method: 'POST'
  });
  const tokenData = await tokenRes.json();
  const idToken = tokenData.idToken;
  if (!idToken) throw new Error('J-Quantsの認証に失敗しました。リフレッシュトークンを確認してください。');

  // 株価取得（過去60日）
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - 90);
  const fmt = d => d.toISOString().split('T')[0];

  const priceRes = await fetch(
    `https://api.jquants.com/v1/prices/daily_quotes?code=${ticker}&from=${fmt(from)}&to=${fmt(to)}`,
    { headers: { Authorization: 'Bearer ' + idToken } }
  );
  const priceData = await priceRes.json();
  const quotes = priceData.daily_quotes;
  if (!quotes || quotes.length === 0) throw new Error('銘柄コードが見つかりません: ' + ticker);

  quotes.sort((a, b) => a.Date.localeCompare(b.Date));
  const prices = quotes.map(q => q.Close);
  const latest = quotes[quotes.length - 1].Close;
  const prev = quotes[quotes.length - 2].Close;
  const volume = quotes[quotes.length - 1].Volume;
  const date = quotes[quotes.length - 1].Date;
  return { prices, latest, prev, volume, date };
}

function getScoreColor(score) {
  if (score >= 70) return 'var(--buy)';
  if (score <= 35) return 'var(--sell)';
  return 'var(--hold)';
}

function getVerdict(score) {
  if (score >= 70) return { text: '買い検討', cls: 'buy' };
  if (score <= 35) return { text: '売り検討', cls: 'sell' };
  return { text: '様子見', cls: 'hold' };
}

function getIndClass(val) {
  if (val > 0) return 'pos';
  if (val < 0) return 'neg';
  return 'neu';
}

function renderCrossBadge(cross) {
  if (cross.type === 'golden') return `<span class="cross-badge golden">🟢 ゴールデンクロス発生</span>`;
  if (cross.type === 'dead') return `<span class="cross-badge dead">🔴 デッドクロス発生</span>`;
  if (cross.type === 'above') return `<span class="cross-badge golden">↑ 5MA > 25MA（上昇トレンド中）</span>`;
  if (cross.type === 'below') return `<span class="cross-badge dead">↓ 5MA < 25MA（下降トレンド中）</span>`;
  return `<span class="cross-badge none">─ クロスなし</span>`;
}

function renderResult(priceInfo, cross, rsi, aiData, ticker) {
  const changeVal = priceInfo.latest - priceInfo.prev;
  const changePct = (changeVal / priceInfo.prev * 100).toFixed(2);
  const isUp = changeVal >= 0;
  const verdict = getVerdict(aiData.score);
  const scoreColor = getScoreColor(aiData.score);

  const indHtml = aiData.indicators.map(ind => {
    const cls = getIndClass(ind.direction);
    const icon = cls === 'pos' ? '▲' : cls === 'neg' ? '▼' : '─';
    return `
      <div class="indicator-row">
        <div class="ind-icon ${cls}">${icon}</div>
        <div class="ind-info">
          <div class="ind-name">${ind.name}</div>
          <div class="ind-detail">${ind.detail}</div>
        </div>
        <div class="ind-score ${cls}">${ind.score > 0 ? '+' : ''}${ind.score}</div>
      </div>`;
  }).join('');

  const html = `
    <div class="price-card">
      <div class="price-header">
        <div class="price-label">取得データ（${priceInfo.date}）</div>
        ${renderCrossBadge(cross)}
      </div>
      <div class="price-data">
        <div class="price-item">
          <div class="price-item-label">終値</div>
          <div class="price-item-value">${priceInfo.latest.toLocaleString()}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">前日比</div>
          <div class="price-item-value ${isUp ? 'pos' : 'neg'}">${isUp ? '+' : ''}${changePct}%</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">RSI(14)</div>
          <div class="price-item-value ${rsi > 70 ? 'neg' : rsi < 30 ? 'pos' : ''}">${rsi ? rsi.toFixed(1) : 'N/A'}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">5MA</div>
          <div class="price-item-value">${cross.ma5 ? cross.ma5.toFixed(2) : 'N/A'}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">25MA</div>
          <div class="price-item-value">${cross.ma25 ? cross.ma25.toFixed(2) : 'N/A'}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">出来高</div>
          <div class="price-item-value">${(priceInfo.volume / 10000).toFixed(0)}万</div>
        </div>
      </div>
    </div>

    <div class="score-card" style="--score-color: ${scoreColor}">
      <div class="score-header">
        <div>
          <span class="ticker-badge">${ticker.toUpperCase()}</span>
          <span class="market-badge">${market}</span>
        </div>
        <div class="verdict ${verdict.cls}">${verdict.text}</div>
      </div>
      <div class="gauge-wrap">
        <div class="gauge-label">
          <span>総合スコア</span>
          <div><strong id="scoreNum">0</strong><small> / 100</small></div>
        </div>
        <div class="gauge-bar"><div class="gauge-fill" id="gaugeFill"></div></div>
      </div>
      <div class="indicators-title">指標ブレークダウン</div>
      <div class="indicators-grid">${indHtml}</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">AIコメント</div>
      <div class="summary-text">${aiData.summary}</div>
      <div class="caution">⚠️ このスコアは投資判断の参考情報です。最終判断はご自身でお願いします。</div>
    </div>`;

  const resultEl = document.getElementById('result');
  resultEl.innerHTML = html;
  resultEl.classList.add('show');

  setTimeout(() => {
    const fill = document.getElementById('gaugeFill');
    const num = document.getElementById('scoreNum');
    if (fill) fill.style.width = aiData.score + '%';
    if (num) {
      let cur = 0;
      const step = aiData.score / 40;
      const timer = setInterval(() => {
        cur = Math.min(cur + step, aiData.score);
        num.textContent = Math.round(cur);
        if (cur >= aiData.score) clearInterval(timer);
      }, 20);
    }
  }, 100);
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (history.length === 0) {
    el.innerHTML = '<div class="empty-history">まだ履歴がありません</div>';
    return;
  }
  el.innerHTML = history.slice(0, 8).map((h, i) => {
    const v = getVerdict(h.score);
    return `<div class="history-item" onclick="showHistory(${i})">
      <span class="hist-ticker">${h.ticker} <span style="font-size:10px;color:var(--muted)">${h.market}</span></span>
      <span class="hist-score" style="color:${getScoreColor(h.score)}">${h.score}</span>
      <span class="hist-verdict ${v.cls}">${v.text}</span>
      <span class="hist-date">${h.date}</span>
    </div>`;
  }).join('');
}

function showHistory(i) {
  const h = history[i];
  document.getElementById('ticker').value = h.ticker;
  setMarket(h.market);
  renderResult(h.priceInfo, h.cross, h.rsi, h.aiData, h.ticker);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearHistory() {
  if (confirm('履歴をすべて削除しますか？')) {
    history = [];
    localStorage.setItem('tradeScoreHistory', '[]');
    renderHistory();
  }
}

async function analyze() {
  const ticker = document.getElementById('ticker').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const errEl = document.getElementById('errorMsg');

  if (!ticker) {
    errEl.textContent = '銘柄コードまたはティッカーを入力してください。';
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.remove('show'));

  try {
    // Step1: 株価取得
    showStep(1);
    let priceInfo;
    if (market === 'JP') {
      priceInfo = await fetchJQuants(ticker);
    } else {
      priceInfo = await fetchAlphaVantage(ticker);
    }

    // Step2: テクニカル計算
    showStep(2);
    await new Promise(r => setTimeout(r, 300));
    const cross = detectCross(priceInfo.prices);
    const rsi = calcRSI(priceInfo.prices);
    const changeVal = priceInfo.latest - priceInfo.prev;
    const changePct = (changeVal / priceInfo.prev * 100).toFixed(2);

    // Step3: AI分析
    showStep(3);
    const crossText = {
      golden: 'ゴールデンクロス発生（強い買いシグナル）',
      dead: 'デッドクロス発生（強い売りシグナル）',
      above: '5MA > 25MA（上昇トレンド継続中）',
      below: '5MA < 25MA（下降トレンド継続中）',
      none: 'クロスなし'
    }[cross.type];

    const marketLabel = market === 'JP' ? '東証（日本株）' : '米国株';
    const prompt = `あなたは株式投資のアナリストです。以下の銘柄のスイングトレード向け売買スコアを算出してください。

銘柄: ${ticker}
市場: ${marketLabel}
終値: ${priceInfo.latest}
前日比: ${changePct}%
RSI(14): ${rsi ? rsi.toFixed(1) : '不明'}
5日移動平均: ${cross.ma5 ? cross.ma5.toFixed(2) : '不明'}
25日移動平均: ${cross.ma25 ? cross.ma25.toFixed(2) : '不明'}
クロス判定: ${crossText}
追加メモ: ${notes || 'なし'}

以下のJSON形式のみで返してください。説明・マークダウン・コードブロック不要。

{
  "score": 0〜100の整数,
  "indicators": [
    {
      "name": "指標名",
      "detail": "現状の説明（30字以内）",
      "score": -20〜+20の整数,
      "direction": 1または-1または0
    }
  ],
  "summary": "総合コメント（日本語、2〜3文）"
}

指標は5〜7個。上記のテクニカルデータを必ず反映してください。`;

    const aiRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const aiRaw = await aiRes.json();
    const aiText = aiRaw.content?.map(c => c.text || '').join('') || '';
    const aiClean = aiText.replace(/```json|```/g, '').trim();
    const aiData = JSON.parse(aiClean);

    document.getElementById('loading').classList.remove('show');
    renderResult(priceInfo, cross, rsi, aiData, ticker);

    // 履歴保存
    const now = new Date();
    const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    history.unshift({ ticker: ticker.toUpperCase(), market, score: aiData.score, priceInfo, cross, rsi, aiData, date: dateStr });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem('tradeScoreHistory', JSON.stringify(history));
    renderHistory();

  } catch (e) {
    document.getElementById('loading').classList.remove('show');
    errEl.innerHTML = '⚠️ ' + (e.message || '分析に失敗しました。') + '<br><small>APIキーの設定を確認してください。</small>';
    errEl.classList.add('show');
  }

  document.getElementById('analyzeBtn').disabled = false;
}

document.getElementById('ticker').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

loadKeys();
renderHistory();
</script>

</html>
