<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeScore</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --buy: #00e5a0;
    --sell: #ff4757;
    --hold: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    position: relative;
    z-index: 1;
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -1px;
  }
  header span {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .input-card label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .ticker-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .ticker-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s;
  }
  .ticker-input:focus { border-color: var(--accent); }
  .ticker-input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; font-size: 13px; }
  .market-toggle {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }
  .market-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .market-btn.active { background: var(--accent); color: var(--bg); font-weight: 500; }

  .notes-area {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .notes-area:focus { border-color: var(--accent); }
  .notes-area::placeholder { color: var(--muted); }

  .analyze-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 16px;
  }
  .analyze-btn:hover { background: #00ffb3; transform: translateY(-1px); }
  .analyze-btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

  .loading { display: none; text-align: center; padding: 40px 20px; }
  .loading.show { display: block; }
  .loader {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-steps { margin-top: 12px; }
  .loading-step {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin: 6px 0;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .loading-step.show { opacity: 1; color: var(--accent); }

  .result { display: none; }
  .result.show { display: block; }

  .price-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .price-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .price-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .cross-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .cross-badge.golden { background: rgba(0,229,160,0.12); color: var(--buy); border: 1px solid rgba(0,229,160,0.2); }
  .cross-badge.dead { background: rgba(255,71,87,0.12); color: var(--sell); border: 1px solid rgba(255,71,87,0.2); }
  .cross-badge.above { background: rgba(0,229,160,0.07); color: var(--buy); border: 1px solid rgba(0,229,160,0.15); }
  .cross-badge.below { background: rgba(255,71,87,0.07); color: var(--sell); border: 1px solid rgba(255,71,87,0.15); }
  .cross-badge.none { background: rgba(90,90,114,0.15); color: var(--muted); border: 1px solid var(--border); }

  .price-data {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .price-item {
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .price-item-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
  .price-item-value { font-size: 14px; font-family: 'DM Mono', monospace; font-weight: 500; }
  .price-item-value.pos { color: var(--buy); }
  .price-item-value.neg { color: var(--sell); }
  .price-item-value.warn { color: var(--hold); }

  .score-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--score-color, var(--accent));
  }
  .score-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .ticker-badge {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 2px;
  }
  .market-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    margin-left: 8px;
  }
  .verdict {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 6px;
  }
  .verdict.buy { background: rgba(0,229,160,0.15); color: var(--buy); }
  .verdict.sell { background: rgba(255,71,87,0.15); color: var(--sell); }
  .verdict.hold { background: rgba(255,209,102,0.15); color: var(--hold); }

  .gauge-wrap { margin-bottom: 20px; }
  .gauge-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .gauge-label span { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .gauge-label strong {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--score-color, var(--accent));
  }
  .gauge-label small { font-size: 16px; color: var(--muted); }
  .gauge-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .gauge-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--score-color, var(--accent));
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0;
  }

  .indicators-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .indicators-grid { display: flex; flex-direction: column; gap: 8px; }
  .indicator-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .ind-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .ind-icon.pos { background: rgba(0,229,160,0.12); }
  .ind-icon.neg { background: rgba(255,71,87,0.12); }
  .ind-icon.neu { background: rgba(255,209,102,0.12); }
  .ind-info { flex: 1; min-width: 0; }
  .ind-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .ind-detail { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .ind-score { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .ind-score.pos { color: var(--buy); }
  .ind-score.neg { color: var(--sell); }
  .ind-score.neu { color: var(--hold); }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .summary-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .summary-text { font-size: 14px; line-height: 1.7; color: var(--text); }
  .caution {
    background: rgba(255,209,102,0.06);
    border: 1px solid rgba(255,209,102,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--hold);
    margin-top: 12px;
    line-height: 1.5;
  }

  .history-section { margin-top: 24px; }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .clear-btn {
    background: none; border: none; color: var(--muted);
    font-size: 11px; font-family: 'DM Mono', monospace;
    cursor: pointer; padding: 2px 6px; border-radius: 4px;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: var(--sell); }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .hist-ticker { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; min-width: 80px; }
  .hist-score { font-family: 'DM Mono', monospace; font-size: 13px; min-width: 40px; }
  .hist-verdict {
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; letter-spacing: 1px;
  }
  .hist-verdict.buy { background: rgba(0,229,160,0.12); color: var(--buy); }
  .hist-verdict.sell { background: rgba(255,71,87,0.12); color: var(--sell); }
  .hist-verdict.hold { background: rgba(255,209,102,0.12); color: var(--hold); }
  .hist-date { font-size: 11px; color: var(--muted); margin-left: auto; font-family: 'DM Mono', monospace; }
  .empty-history { text-align: center; color: var(--muted); font-size: 13px; padding: 20px; }

  .error-msg {
    background: rgba(255,71,87,0.08);
    border: 1px solid rgba(255,71,87,0.2);
    border-radius: 8px;
    padding: 14px;
    color: var(--sell);
    font-size: 13px;
    display: none;
    margin-top: 12px;
    line-height: 1.6;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>TradeScore</h1>
    <span>AI 売買判断アシスト</span>
  </header>

  <div class="input-card">
    <label>銘柄 / TICKER</label>
    <div class="ticker-row">
      <input class="ticker-input" id="ticker" type="text" placeholder="例: 9506 / AAPL" maxlength="10">
      <div class="market-toggle">
        <button class="market-btn active" data-market="JP" onclick="setMarket('JP')">JP</button>
        <button class="market-btn" data-market="US" onclick="setMarket('US')">US</button>
      </div>
    </div>
    <label>追加メモ（任意）</label>
    <textarea class="notes-area" id="notes" placeholder="気になる情報があれば自由に。空欄でもOK。&#10;例：決算前、出来高急増、ニュースで話題…"></textarea>
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">AI分析スタート</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="loading" id="loading">
    <div class="loader"></div>
    <div class="loading-steps">
      <div class="loading-step" id="step1">① 最新の株価・指標を検索中...</div>
      <div class="loading-step" id="step2">② ゴールデンクロス・RSIを判定中...</div>
      <div class="loading-step" id="step3">③ スコアリング・コメント生成中...</div>
    </div>
  </div>

  <div class="result" id="result"></div>

  <div class="history-section">
    <div class="section-title">
      <span>履歴</span>
      <button class="clear-btn" onclick="clearHistory()">クリア</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
let market = 'JP';
let history = JSON.parse(localStorage.getItem('tradeScoreHistory') || '[]');

function setMarket(m) {
  market = m;
  document.querySelectorAll('.market-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.market === m);
  });
}

function showStep(n) {
  document.getElementById('step' + n).classList.add('show');
}

function getScoreColor(score) {
  if (score >= 70) return 'var(--buy)';
  if (score <= 35) return 'var(--sell)';
  return 'var(--hold)';
}

function getVerdict(score) {
  if (score >= 70) return { text: '買い検討', cls: 'buy' };
  if (score <= 35) return { text: '売り検討', cls: 'sell' };
  return { text: '様子見', cls: 'hold' };
}

function renderCrossBadge(cross) {
  const map = {
    golden: ['golden', '🟢 ゴールデンクロス発生'],
    dead:   ['dead',   '🔴 デッドクロス発生'],
    above:  ['above',  '↑ 上昇トレンド中'],
    below:  ['below',  '↓ 下降トレンド中'],
    none:   ['none',   '─ クロスなし'],
  };
  const [cls, label] = map[cross] || map['none'];
  return `<span class="cross-badge ${cls}">${label}</span>`;
}

function renderResult(data, ticker) {
  const scoreColor = getScoreColor(data.score);
  const verdict = getVerdict(data.score);

  const indHtml = data.indicators.map(ind => {
    const cls = ind.direction > 0 ? 'pos' : ind.direction < 0 ? 'neg' : 'neu';
    const icon = cls === 'pos' ? '▲' : cls === 'neg' ? '▼' : '─';
    return `
      <div class="indicator-row">
        <div class="ind-icon ${cls}">${icon}</div>
        <div class="ind-info">
          <div class="ind-name">${ind.name}</div>
          <div class="ind-detail">${ind.detail}</div>
        </div>
        <div class="ind-score ${cls}">${ind.score > 0 ? '+' : ''}${ind.score}</div>
      </div>`;
  }).join('');

  const changeCls = data.changePct >= 0 ? 'pos' : 'neg';
  const changeStr = (data.changePct >= 0 ? '+' : '') + data.changePct + '%';
  const rsiCls = data.rsi > 70 ? 'neg' : data.rsi < 30 ? 'pos' : '';

  const html = `
    <div class="price-card">
      <div class="price-header">
        <div class="price-label">取得データ（最新）</div>
        ${renderCrossBadge(data.cross)}
      </div>
      <div class="price-data">
        <div class="price-item">
          <div class="price-item-label">終値</div>
          <div class="price-item-value">${data.price || '─'}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">前日比</div>
          <div class="price-item-value ${changeCls}">${data.changePct != null ? changeStr : '─'}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">RSI(14)</div>
          <div class="price-item-value ${rsiCls}">${data.rsi != null ? data.rsi : '─'}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">5MA</div>
          <div class="price-item-value">${data.ma5 || '─'}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">25MA</div>
          <div class="price-item-value">${data.ma25 || '─'}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">出来高</div>
          <div class="price-item-value">${data.volume || '─'}</div>
        </div>
      </div>
    </div>

    <div class="score-card" style="--score-color: ${scoreColor}">
      <div class="score-header">
        <div>
          <span class="ticker-badge">${ticker.toUpperCase()}</span>
          <span class="market-badge">${market}</span>
        </div>
        <div class="verdict ${verdict.cls}">${verdict.text}</div>
      </div>
      <div class="gauge-wrap">
        <div class="gauge-label">
          <span>総合スコア</span>
          <div><strong id="scoreNum">0</strong><small> / 100</small></div>
        </div>
        <div class="gauge-bar"><div class="gauge-fill" id="gaugeFill"></div></div>
      </div>
      <div class="indicators-title">指標ブレークダウン</div>
      <div class="indicators-grid">${indHtml}</div>
    </div>

    <div class="summary-card">
      <div class="summary-label">AIコメント</div>
      <div class="summary-text">${data.summary}</div>
      <div class="caution">⚠️ このスコアは投資判断の参考情報です。最終判断はご自身でお願いします。</div>
    </div>`;

  const resultEl = document.getElementById('result');
  resultEl.innerHTML = html;
  resultEl.classList.add('show');

  setTimeout(() => {
    const fill = document.getElementById('gaugeFill');
    const num = document.getElementById('scoreNum');
    if (fill) fill.style.width = data.score + '%';
    if (num) {
      let cur = 0;
      const step = data.score / 40;
      const timer = setInterval(() => {
        cur = Math.min(cur + step, data.score);
        num.textContent = Math.round(cur);
        if (cur >= data.score) clearInterval(timer);
      }, 20);
    }
  }, 100);
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (history.length === 0) {
    el.innerHTML = '<div class="empty-history">まだ履歴がありません</div>';
    return;
  }
  el.innerHTML = history.slice(0, 10).map((h, i) => {
    const v = getVerdict(h.score);
    return `<div class="history-item" onclick="showHistory(${i})">
      <span class="hist-ticker">${h.ticker} <span style="font-size:10px;color:var(--muted)">${h.market}</span></span>
      <span class="hist-score" style="color:${getScoreColor(h.score)}">${h.score}</span>
      <span class="hist-verdict ${v.cls}">${v.text}</span>
      <span class="hist-date">${h.date}</span>
    </div>`;
  }).join('');
}

function showHistory(i) {
  const h = history[i];
  document.getElementById('ticker').value = h.ticker;
  setMarket(h.market);
  renderResult(h.data, h.ticker);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearHistory() {
  if (confirm('履歴をすべて削除しますか？')) {
    history = [];
    localStorage.setItem('tradeScoreHistory', '[]');
    renderHistory();
  }
}

async function analyze() {
  const ticker = document.getElementById('ticker').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const errEl = document.getElementById('errorMsg');

  if (!ticker) {
    errEl.textContent = '銘柄コードまたはティッカーを入力してください。';
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  ['step1','step2','step3'].forEach(s => document.getElementById(s).classList.remove('show'));

  try {
    showStep(1);
    await new Promise(r => setTimeout(r, 400));
    showStep(2);
    await new Promise(r => setTimeout(r, 400));
    showStep(3);

    const marketLabel = market === 'JP' ? '東証（日本株）' : '米国株';

    const prompt = `あなたは株式投資のアナリストです。以下の銘柄についてweb検索で最新情報を調べ、スイングトレード向けの売買スコアを算出してください。

銘柄: ${ticker}
市場: ${marketLabel}
追加メモ: ${notes || 'なし'}

【手順】
1. まずweb検索で以下を調べる：
   - 最新の終値・前日比
   - 5日移動平均・25日移動平均（ゴールデンクロス/デッドクロスの有無）
   - RSI(14)
   - 出来高の傾向
   - 直近のニュース・材料

2. 調べた情報をもとに以下のJSON形式のみで返す。説明・マークダウン・コードブロック不要。

{
  "price": "終値（文字列、例: 2,450円 または $182.50）",
  "changePct": 前日比の数値（例: 1.2 または -0.8）,
  "rsi": RSIの数値（整数、不明なら null）,
  "ma5": "5日移動平均（文字列、不明なら null）",
  "ma25": "25日移動平均（文字列、不明なら null）",
  "cross": "golden / dead / above / below / none のいずれか",
  "volume": "出来高の概要（文字列、例: 通常比150%増）",
  "score": 0〜100の整数（70以上=買い検討、35以下=売り検討）,
  "indicators": [
    {
      "name": "指標名",
      "detail": "現状の説明（40字以内）",
      "score": -20〜+20の整数,
      "direction": 1または-1または0
    }
  ],
  "summary": "総合コメント（日本語、2〜3文、根拠を含む）"
}

指標は5〜7個選定してください。テクニカル・ファンダメンタル・需給・ニュースを混合してください。`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const raw = await res.json();

    // テキストブロックを抽出
    const textBlocks = (raw.content || []).filter(c => c.type === 'text').map(c => c.text).join('');
    const clean = textBlocks.replace(/```json|```/g, '').trim();

    // JSONを抽出（前後に余分なテキストがある場合も対応）
    const jsonMatch = clean.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('データの解析に失敗しました。');
    const data = JSON.parse(jsonMatch[0]);

    document.getElementById('loading').classList.remove('show');
    renderResult(data, ticker);

    // 履歴保存
    const now = new Date();
    const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    history.unshift({ ticker: ticker.toUpperCase(), market, score: data.score, data, date: dateStr });
    if (history.length > 20) history = history.slice(0, 20);
    localStorage.setItem('tradeScoreHistory', JSON.stringify(history));
    renderHistory();

  } catch (e) {
    document.getElementById('loading').classList.remove('show');
    errEl.innerHTML = '⚠️ ' + (e.message || '分析に失敗しました。もう一度お試しください。');
    errEl.classList.add('show');
  }

  document.getElementById('analyzeBtn').disabled = false;
}

document.getElementById('ticker').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});

renderHistory();
</script>
</body>
</html>
